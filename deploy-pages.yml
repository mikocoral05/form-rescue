name: Deploy Demo and Docs to GitHub Pages

on:
  # Trigger the workflow on pushes to the main branch
  push:
    branches: ['main']
  # Allow manual triggering from the GitHub Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies and build
        run: |
          npm install
          npm run build

      - name: Prepare site directory and generate docs
        run: |
          mkdir _site
          cp -r dist _site/dist
          # Copy the demo and fix the script path to work at the root directory
          sed 's|../dist/|./dist/|g' examples/index.html > _site/index.html
          # Automatically generate API documentation using TypeDoc
          npx typedoc index.ts --out _site/docs --name "form-rescue API" --gitRevision main --customCss typedoc-theme.css
          # Copy the logo image into the generated docs folder
          cp logo.png _site/docs/logo.png

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
