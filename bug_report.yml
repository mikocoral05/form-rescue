name: Bug Report
description: Create a report to help us improve form-rescue
title: '[Bug]: '
labels: ['bug']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please provide as much detail as possible.
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Please provide the exact steps or code snippets to reproduce the issue.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: form-rescue version
      placeholder: e.g., 1.0.0
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Browser & OS Environment
      placeholder: e.g., Chrome 120 on macOS Sonoma
    validations:
      required: true
